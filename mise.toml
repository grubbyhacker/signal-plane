[tools]
go = "1.26.4"

[tasks.fmt]
run = "gofmt -w $(git ls-files --cached --others --exclude-standard '*.go')"

[tasks.fmt-check]
run = """
unformatted="$(gofmt -l $(git ls-files --cached --others --exclude-standard '*.go'))"
if [ -n "$unformatted" ]; then
  echo "go fmt drift detected; run mise run fmt"
  echo "$unformatted"
  exit 1
fi
"""

[tasks.check]
run = "mise run fmt-check && mise run test && mise run build"

[tasks.test]
run = "GOCACHE=$PWD/.gocache GOMODCACHE=$PWD/.gomodcache go test ./..."

[tasks.build]
run = "GOCACHE=$PWD/.gocache GOMODCACHE=$PWD/.gomodcache go build ./cmd/signal-gateway ./cmd/signal-observer ./cmd/github-task-dispatcher"

[tasks.image-build]
run = "docker build -t signal-plane:local ."

[tasks.tidy]
run = "GOCACHE=$PWD/.gocache GOMODCACHE=$PWD/.gomodcache go mod tidy"

[tasks.compose-up]
run = "docker compose -f deploy/compose.local.yaml up -d"

[tasks.compose-down]
run = "docker compose -f deploy/compose.local.yaml down"

[tasks.gateway]
run = "GOCACHE=$PWD/.gocache GOMODCACHE=$PWD/.gomodcache go run ./cmd/signal-gateway"

[tasks.observer]
run = "GOCACHE=$PWD/.gocache GOMODCACHE=$PWD/.gomodcache go run ./cmd/signal-observer"

[tasks.smoke-local]
run = "scripts/smoke-local.sh"
