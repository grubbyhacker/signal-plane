[tools]
go = "1.26.4"

[tasks.fmt]
run = "gofmt -w $(git ls-files --cached --others --exclude-standard '*.go')"

[tasks.fmt-check]
run = """
unformatted="$(gofmt -l $(git ls-files --cached --others --exclude-standard '*.go'))"
if [ -n "$unformatted" ]; then
  echo "go fmt drift detected; run mise run fmt"
  echo "$unformatted"
  exit 1
fi
"""

[tasks.check]
run = "mise run fmt-check && mise run validate:image-tag-contract && mise run test && mise run build"

[tasks."validate:image-tag-contract"]
run = "python3 scripts/validate-image-tag-contract.py"

[tasks.test]
run = "GOCACHE=$PWD/.gocache GOMODCACHE=$PWD/.gomodcache go test ./..."

[tasks."staging:resume-release-proof"]
description = "Run the guarded synthetic release proof against deployed local YouKnowMe"
run = "GOCACHE=$PWD/.gocache GOMODCACHE=$PWD/.gomodcache go test -count=1 -v -run '^TestStagingSyntheticReleaseToDeployedYouKnowMe$' ./internal/resumeupload"

[tasks."proof:phase5-local"]
description = "Run the deterministic versioned Phase 5 local integration proof"
run = "GOCACHE=$PWD/.gocache GOMODCACHE=$PWD/.gomodcache go test ./internal/dispatcher -run '^TestPhase5LocalV1Proof$' -count=1"

[tasks."proof:dispatcher-recovery"]
description = "Run the deterministic in-process dispatcher restore/replay/reconciliation proof"
run = "GOCACHE=$PWD/.gocache GOMODCACHE=$PWD/.gomodcache go test ./internal/recovery -run '^TestDispatcherRecoveryProof$' -count=1"

[tasks.build]
run = "GOCACHE=$PWD/.gocache GOMODCACHE=$PWD/.gomodcache go build ./cmd/signal-gateway ./cmd/signal-observer ./cmd/github-task-dispatcher ./cmd/resume-release-router ./cmd/push-security-scanner ./cmd/github-green-pr-coordinator ./cmd/github-green-pr-fixture-admit"

[tasks.image-build]
run = "docker build -t signal-plane:local ."

[tasks.tidy]
run = "GOCACHE=$PWD/.gocache GOMODCACHE=$PWD/.gomodcache go mod tidy"

[tasks.compose-up]
run = "docker compose -f deploy/compose.local.yaml up -d"

[tasks.compose-down]
run = "docker compose -f deploy/compose.local.yaml down"

[tasks.gateway]
run = "GOCACHE=$PWD/.gocache GOMODCACHE=$PWD/.gomodcache go run ./cmd/signal-gateway"

[tasks.observer]
run = "GOCACHE=$PWD/.gocache GOMODCACHE=$PWD/.gomodcache go run ./cmd/signal-observer"

[tasks.smoke-local]
run = "scripts/smoke-local.sh"
