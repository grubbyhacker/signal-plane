gateway:
  addr: ":8080"

nats:
  url: nats://127.0.0.1:4222
  stream: SIGNALS
  subjects:
    - signals.>

# The dispatcher is intentionally inert until its private broker and durable
# state prerequisites are configured.
dispatcher:
  enabled: false
  addr: ":8082"
  subject: signals.github.>
  durable: github-task-dispatcher
  # Recovery only: set this to the validated manifest sequence + 1. Normal
  # startup rejects it until `recover --execute` records matching evidence.
  # recovery_start_sequence: 1
  database_path: github-task-dispatcher.db
  broker_url: http://127.0.0.1:8091/v1/launch-profiles/codex-issue-implement/launch
  broker_token_env: GITHUB_TASK_DISPATCHER_BROKER_TOKEN
  workers: 1

# Compiled deterministic Resume Builder release route. It remains inert until
# deployment-owned configuration and secrets explicitly enable it.
work_router:
  enabled: false
  addr: ":8083"
  subject: signals.github.webhook
  durable: resume-release-router
  database_path: github-task-dispatcher.db
  ykm_url: http://youknowme-mcp:8765/mcp
  ykm_auth_mode: local_secret
  github_private_key_path: /run/secrets/github-fleiglabs-release-reader-app.pem
  ykm_local_secret_env: SIGNAL_PLANE_YKM_LOCAL_SECRET

# Dedicated PR10 async push tripwire. It remains inert until deployment-owned
# broker identity, fingerprint key, catalog, profile generation, and durable
# state are reviewed together.
push_scanner:
  enabled: false
  addr: ":8084"
  subject: signals.github.webhook
  durable: push-security-scanner
  database_path: push-security-scanner.db
  broker_url: http://127.0.0.1:8080/v1/security/push-tripwire
  broker_token_env: PUSH_SECURITY_SCANNER_BROKER_TOKEN
  fingerprint_key_env: PUSH_SECURITY_SCANNER_FINGERPRINT_KEY
  holder_token_env: PUSH_SECURITY_SCANNER_HOLDER_TOKEN
  event_subject: signals.security.push-tripwire
  repositories: [grubbyhacker/gh-agent-broker]
  refs: [refs/heads/agent/hermes-agent-infra/pr10-security-proof]
  profile: general-writer-v1
  profile_generation: 1
  canary_attribution:
    logical_session_id: synthetic-pr10-canary-session
    session_lineage_id: "11111111111111111111111111111111"
    worker_id: synthetic-pr10-canary-worker
    worker_storage_lineage_id: "22222222222222222222222222222222"
    worker_fence_epoch: 1
  forensic_retention: 168h
  reconcile_interval: 5s
  fingerprint_prune_interval: 1h
  bounds:
    max_commits: 100
    max_paths: 300
    max_blob_bytes: 1048576
    max_total_bytes: 16777216
    max_candidates: 4096
    max_decode_depth: 2

# The durable github_green_pr_v1 coordinator is fixture-only. Production
# remains disabled: it has no route, principal, or broker identity here.
coordinator:
  enabled: false
  database_path: github-green-pr-coordinator.db
  broker_url: http://127.0.0.1:8091
  broker_token_env: GITHUB_GREEN_PR_COORDINATOR_TOKEN
  poll_interval: 1s

routes:
  - id: manual-local
    path: /manual
    source: manual
    max_body_bytes: 1048576
    manual_auth_token_env: SIGNAL_GATEWAY_MANUAL_TOKEN
    publish_subject: signals.manual.local.test

  - id: github-local
    path: /webhooks/github
    source: github
    max_body_bytes: 1048576
    publish_subject: signals.github.webhook
    github:
      webhook_secret_env: SIGNAL_GATEWAY_GITHUB_WEBHOOK_SECRET
      publish_ping: false
    admission:
      tuples:
        - repository: grubbyhacker/signal-plane
          event: pull_request
          actions: [opened, reopened, synchronize]
