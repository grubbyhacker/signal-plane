gateway:
  addr: ":8080"

nats:
  url: nats://127.0.0.1:4222
  stream: SIGNALS
  subjects:
    - signals.>

routes:
  - id: manual-local
    path: /manual
    source: manual
    max_body_bytes: 1048576
    manual_auth_token_env: SIGNAL_GATEWAY_MANUAL_TOKEN
    publish_subject: signals.manual.local.test

  - id: github-local
    path: /webhooks/github
    source: github
    max_body_bytes: 1048576
    publish_subject: signals.github.webhook
    github:
      webhook_secret_env: SIGNAL_GATEWAY_GITHUB_WEBHOOK_SECRET
      publish_ping: false
    admission:
      repositories:
        - grubbyhacker/signal-plane
      events:
        - pull_request
        - ping
      actions:
        - opened
        - reopened
        - synchronize
